name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        if: matrix.use-cross
        uses: cargo-bins/cargo-binstall@main

      - name: Install cross
        if: matrix.use-cross
        run: cargo binstall -y cross

      - name: Build
        if: ${{ !matrix.use-cross }}
        run: cargo build --target ${{ matrix.target }} --verbose

      - name: Test
        if: ${{ !matrix.use-cross }}
        run: cargo test --target ${{ matrix.target }} --verbose

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --target ${{ matrix.target }} --verbose

      - name: Test (cross)
        if: matrix.use-cross
        run: cross test --target ${{ matrix.target }} --verbose

  wasm:
    name: Build & Test (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        run: cargo build --target wasm32-unknown-unknown --verbose

      - name: Test (Node.js)
        run: wasm-pack test --node --verbose

      - name: Test (Firefox)
        run: wasm-pack test --headless --firefox --release
